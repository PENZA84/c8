name: Node Extraction Workflow

on:
  push:
    paths:
      - 'deep_extract.py'
      - 'latest.yaml'
  schedule:
    - cron: '0 0 * * *' # 北京时间 08:00 运行
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests loguru

      - name: Run extraction script
        run: python deep_extract.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # 检查文件是否有变动
          if [ -n "$(git status --porcelain all_nodes.yaml)" ]; then
            git add all_nodes.yaml
            git commit -m "Auto-update: sync nodes from deep_extract.py [$(date '+%Y-%m-%d %H:%M:%S')]"
            git push
          else
            echo "No changes to commit."
          fi
